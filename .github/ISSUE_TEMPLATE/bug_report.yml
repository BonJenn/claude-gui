name: Bug report
description: Report a reproducible Blackcrab bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.4
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Blackcrab version or commit
  - type: input
    id: claude-version
    attributes:
      label: Claude Code CLI version
      placeholder: claude --version
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Remove secrets, tokens, private file contents, and sensitive paths if needed.
      render: text
